apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: harness-demo-app
  labels:
    app: harness-demo
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: <+artifact.image>
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: PORT
              value: "8080"
  traffic:
    - percent: 100
      latestRevision: true
